<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Acesso | portifólio Lab</title>
    
    <style>
        /* --- AJUSTE PARA CELULAR --- */
@media (max-width: 768px) {
    /* Ajusta o cabeçalho ROOT@USER */
    header, .header {
        padding: 10px;
        text-align: center;
    }

    /* Faz o menu quebrar em várias linhas para não sumir da tela */
    nav, .navbar, .menu {
        display: flex;
        flex-wrap: wrap; /* O SEGREDO: joga o que não couber para baixo */
        justify-content: center;
        gap: 8px;
        padding: 10px 5px;
    }

    /* Diminui um pouco o tamanho dos links no menu */
    nav a, .menu a {
        font-size: 12px !important;
        padding: 5px !important;
    }

    /* Ajusta o corpo do texto para não bater nas bordas do celular */
    body, section, .container {
        padding: 10px;
        overflow-x: hidden; /* Evita a barra de rolagem lateral chata */
    }

    /* Garante que as imagens não estourem a tela */
    img {
        max-width: 100%;
        height: auto;
    }
}
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #050505;
            color: #00ff41;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Efeito de Scanlines (Linhas de monitor antigo) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .login-box {
            background: #000;
            padding: 40px;
            border: 2px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
            border-radius: 5px;
            text-align: center;
            width: 350px;
            z-index: 3;
            position: relative;
        }

        h2 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 1.5rem; }

        .input-group { text-align: left; margin-bottom: 15px; }

        label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: #008f11; }

        input {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #008f11;
            color: #00ff41;
            outline: none;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        input:focus { border-color: #00ff41; box-shadow: 0 0 5px #00ff41; }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #008f11;
            border: none;
            color: #000;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-login:hover { background: #00ff41; box-shadow: 0 0 15px #00ff41; }

        #status-msg {
            margin-top: 20px;
            padding: 10px;
            border: 1px dashed;
            font-size: 0.8rem;
            display: none; /* Escondido por padrão */
        }
        
        .success { color: #00ff41; border-color: #00ff41; display: block !important; }
        .error { color: #ff3e3e; border-color: #ff3e3e; display: block !important; }

        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 class="glitch">[ACESSAR_PORTIFÓLIO]</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label>root: admin | chave: admin</label>
                <input type="text" id="username" required autocomplete="off" placeholder="root">
            </div>
            
            <div class="input-group">
                <label>CHAVE_DE_CRIPTOGRAFIA</label>
                <input type="password" id="password" required placeholder="********">
            </div>

            <button type="submit" class="btn-login">EXECUTAR LOGIN</button>
        </form>

        <div id="status-msg"></div>

        <p style="font-size: 0.6rem; color: #444; margin-top: 20px;">
            SSH-RSA 4096: Conexão criptografada via AES-256
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede a página de recarregar

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const statusBox = document.getElementById('status-msg');

            // Simulação de autenticação
            if (user === 'admin' && pass === 'admin') {
                statusBox.textContent = "ACESSO CONCEDIDO: Bem-vindo ao portifólio!";
                statusBox.className = "success";
                
                // Redireciona para a página principal após 2 segundos
                setTimeout(() => {
                    window.location.href = 'gemini.html'; // Substitua pelo nome do seu arquivo principal
                }, 2000);
            } else {
                statusBox.textContent = "ERRO CRÍTICO: Credenciais Inválidas.";
                statusBox.className = "error";
                
                // Pequeno efeito de tremor na caixa de login ao errar
                const box = document.querySelector('.login-box');
                box.style.animation = "none";
                setTimeout(() => box.style.animation = "glitch 0.2s linear 2", 10);
            }
        });
    </script>

</body>
</html>
